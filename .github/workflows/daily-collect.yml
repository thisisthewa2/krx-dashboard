name: Daily Data Collect

# 평일(월~금) KST 14:30 (= UTC 05:30) 에 일배치 수집.
# 공공데이터포털 거래소 데이터는 영업일+1 오후 1시 이후 갱신되므로
# 14:30 은 안전마진을 둔 시각이다.
on:
  schedule:
    - cron: "30 5 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pipeline
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        working-directory: pipeline
        run: |
          if [ -z "${DATA_GO_KR_KEY}" ]; then
            echo "::warning::DATA_GO_KR_KEY 가 설정되지 않아 demo 모드로 실행합니다."
            python -m etf_monitor --demo --verbose
          else
            python -m etf_monitor --verbose
          fi

      - name: Commit & push data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots web/public/data || true
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
